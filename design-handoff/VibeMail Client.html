<style>
  /* ── Fix: the DS defines --text-body as BOTH a color (colors.css) and a 14px
     size (typography.css, loaded later) — so using it as a color resolves
     invalid → black. This token carries the intended body-ink color. */
  :root { --text-body-ink: oklch(from #a6a8b6 calc(l + 0.10) c h); }

  /* ── Light theme — token overrides only; same glass vocabulary, inverted.
     Canvas returns to the brand cream (#fdfcfc); glass becomes navy-opacity
     over cream; the lit border flips to a navy hairline + white top sheen. */
  html[data-theme="light"] {
    --canvas:
      radial-gradient(circle 260px at 0% 0%,        rgba(255,255,255,0.95) 0%, transparent 100%),
      radial-gradient(ellipse 68% 52% at 100% 0%,   rgba(48,209,88,0.10) 0%, transparent 55%),
      radial-gradient(ellipse 50% 60% at 2% 100%,   rgba(48,209,88,0.07) 0%, transparent 50%),
      radial-gradient(ellipse 38% 38% at 98% 98%,   rgba(25,175,65,0.06) 0%, transparent 45%),
      linear-gradient(135deg, #f9fdfb 0%, #f3faf6 50%, #edf7f1 100%);
    --navy: #fdfcfc;
    --navy-deep: #edebe7;
    --navy-raised: #ffffff;

    /* Text: −10 pp lightness in light mode */
    --cream:          oklch(from #14181f calc(l - 0.10) c h);
    --text-primary:   oklch(from #14181f calc(l - 0.10) c h);
    --text-secondary: oklch(from #3a4051 calc(l - 0.10) c h);
    --text-body-ink:  oklch(from #4a5065 calc(l - 0.10) c h);
    --text-muted:     oklch(from #6b6f7c calc(l - 0.10) c h);
    --text-faint:     oklch(from #8e919c calc(l - 0.10) c h);
    --text-disabled:  oklch(from #b3b5bd calc(l - 0.10) c h);

    --glass-0: rgba(16, 22, 39, 0.04);
    --glass-1: rgba(16, 22, 39, 0.06);
    --glass-2: rgba(16, 22, 39, 0.09);
    --glass-hover: rgba(16, 22, 39, 0.11);
    --glass-active: rgba(16, 22, 39, 0.05);
    --glass-drawer: rgba(253, 252, 252, 0.86);
    --glass-scrim: rgba(16, 22, 39, 0.30);

    --border-hairline: rgba(16, 22, 39, 0.10);
    --border-default: rgba(16, 22, 39, 0.14);
    --border-strong: rgba(16, 22, 39, 0.24);
    --border-top-sheen: rgba(255, 255, 255, 0.85);

    --accent-hover: #0069dd;
    --accent-active: #0052ad;
    --accent-soft: rgba(0, 122, 255, 0.12);
    --accent-glow: rgba(0, 122, 255, 0.30);

    --success: #1f9e47;
    --warning: #c77700;
    --warning-hover: #a36200;
    --danger: #d70015;
    --danger-hover: #b00012;
    --danger-soft: rgba(215, 0, 21, 0.10);

    --shadow-0: 0 2px 8px rgba(16, 22, 39, 0.08);
    --shadow-1: 0 4px 16px rgba(16, 22, 39, 0.10);
    --shadow-2: 0 8px 24px rgba(16, 22, 39, 0.14);
    --shadow-3: 0 16px 48px rgba(16, 22, 39, 0.20);
    --shadow-drawer: 0 -16px 48px rgba(16, 22, 39, 0.18);

    --star-idle: rgba(16, 22, 39, 0.22);
  }

  html, body { height: 100%; }
  body { margin: 0; overflow: hidden; }

  /* ── Dark grey canvas — override the DS navy tokens with neutral charcoal. */
  :root {
    --navy-deep:   #080808;
    --navy:        #111111;
    --navy-raised: #1c1c1e;
    --canvas: radial-gradient(120% 120% at 80% -10%, #1e1e1e 0%, #111111 42%, #080808 100%);
    /* Text: +10 pp lightness in dark mode */
    --text-primary:   oklch(from #fdfcfc calc(l + 0.10) c h);
    --cream:          oklch(from #fdfcfc calc(l + 0.10) c h);
    --text-secondary: oklch(from #c8c9d4 calc(l + 0.10) c h);
    --text-muted:     oklch(from #9a9898 calc(l + 0.10) c h);
    --text-faint:     oklch(from #6e6e73 calc(l + 0.10) c h);
    --text-disabled:  oklch(from #565760 calc(l + 0.10) c h);
    /* Drawer loses its navy tint; scrim stays neutral dark */
    --glass-drawer: rgba(20, 20, 20, 0.82);
    --glass-scrim:  rgba(8, 8, 8, 0.55);
  }

  /* ── Font scaling — re-derive the DS type scale from one factor.
     This file loads after the DS tokens, so these calc() overrides win.
     --vm-mobile-scale shrinks type a notch on vertical phones. */
  :root {
    --vm-font-scale: 1;
    --vm-mobile-scale: 1;
    --text-display: calc(38px * var(--vm-font-scale) * var(--vm-mobile-scale));
    --text-title:   calc(22px * var(--vm-font-scale) * var(--vm-mobile-scale));
    --text-heading: calc(16px * var(--vm-font-scale) * var(--vm-mobile-scale));
    --text-body:    calc(14px * var(--vm-font-scale) * var(--vm-mobile-scale));
    --text-row:     calc(13px * var(--vm-font-scale) * var(--vm-mobile-scale));
    --text-caption: calc(12px * var(--vm-font-scale) * var(--vm-mobile-scale));
    --text-micro:   calc(11px * var(--vm-font-scale) * var(--vm-mobile-scale));
  }
  @media (max-width: 700px) {
    :root { --vm-mobile-scale: 0.75; }
  }

  /* ── Mobile nav drawer — slides in from the left over the active panel ── */
  .vm-mobile-nav { animation: vmNavIn var(--dur-slow) var(--ease-out); }
  @keyframes vmNavIn {
    from { transform: translateX(-100%); }
    to   { transform: translateX(0); }
  }
  @media (prefers-reduced-motion: reduce) { .vm-mobile-nav { animation: none; } }

  /* ── Animated canvas — two soft gradient blobs drifting behind the glass.
     transform-only (compositor), very slow, no filters, no 3D. */
  #vm-aurora { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
  #vm-aurora span {
    position: absolute; border-radius: 50%; will-change: transform;
    width: 90vmax; height: 90vmax;
  }
  #vm-aurora .vm-blob-a {
    top: -55vmax; right: -30vmax;
    background: radial-gradient(circle at center, var(--vm-blob-a) 0%, transparent 62%);
    animation: vmDriftA 52s var(--ease-standard) infinite alternate;
  }
  #vm-aurora .vm-blob-b {
    bottom: -60vmax; left: -35vmax;
    background: radial-gradient(circle at center, var(--vm-blob-b) 0%, transparent 60%);
    animation: vmDriftB 67s var(--ease-standard) infinite alternate;
  }
  @keyframes vmDriftA {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(-14vmax, 10vmax) scale(1.15); }
  }
  @keyframes vmDriftB {
    from { transform: translate(0, 0) scale(1.1); }
    to   { transform: translate(12vmax, -9vmax) scale(0.95); }
  }
  :root {
    --accent: #30d158;
    --accent-hover: #4fe06f;
    --accent-active: #25a847;
    --accent-soft: rgba(48,209,88,0.16);
    --accent-glow: rgba(48,209,88,0.45);
    --dot-unread: #30d158;
    --star-active: #30d158;
    --vm-blob-a: rgba(48, 209, 88, 0.10);
    --vm-blob-b: rgba(64, 36, 120, 0.22);
  }
  html[data-theme="light"] { --vm-blob-a: rgba(48, 209, 88, 0.10); --vm-blob-b: rgba(25, 160, 65, 0.08); }
  html.vm-static #vm-aurora span { animation: none; }
  @media (prefers-reduced-motion: reduce) { #vm-aurora span { animation: none; } }

  /* Aurora blobs retired — static mode uses the CSS canvas; animated mode uses the WebGL nebula */
  #vm-aurora { display: none; }

  /* Light-mode white wash — sits above the WebGL nebula, below the app glass */
  #vm-light-overlay {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
    background: transparent;
    transition: background 0.3s ease;
  }
  html[data-theme="light"] #vm-light-overlay {
    background: rgba(255, 255, 255, 0.35);
  }

  /* ── Splash screen — pure HTML/CSS so it paints before React loads;
     App fades it out once mounted. */
  #vm-splash {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px;
    background-color: var(--navy); background-image: var(--canvas);
    transition: opacity 0.45s var(--ease-standard);
  }
  #vm-splash.vm-splash-out { opacity: 0; pointer-events: none; }
  #vm-splash-google {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 20px;
    background: var(--glass-1);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-family: var(--font-mono); font-size: 13px; font-weight: 500;
    cursor: pointer; letter-spacing: 0.01em;
    opacity: 0; transform: translateY(8px); pointer-events: none;
    transition: opacity 0.32s var(--ease-standard), transform 0.32s var(--ease-standard), background 0.12s var(--ease-standard);
    -webkit-backdrop-filter: var(--glass-blur-1); backdrop-filter: var(--glass-blur-1);
    box-shadow: var(--shadow-1), inset 0 1px 0 var(--border-top-sheen);
  }
  #vm-splash-google.vm-btn-ready { opacity: 1; transform: translateY(0); pointer-events: auto; }
  #vm-splash-google:hover { background: var(--glass-hover); }
  #vm-splash-google:active { transform: translateY(1px) scale(.99); }
  .vm-splash-mark {
    width: 64px; height: 64px; display: flex; align-items: center; justify-content: center;
    background: var(--glass-2); border: 1px solid var(--border-strong); border-radius: var(--radius-md);
    box-shadow: var(--shadow-2), inset 0 1px 0 var(--border-top-sheen); color: var(--accent);
  }
  .vm-splash-word { font-family: var(--font-mono); font-weight: var(--fw-bold); font-size: 22px; color: var(--text-primary); }
  .vm-splash-word b { color: var(--accent); font-weight: var(--fw-bold); }
  .vm-splash-bar { width: 140px; height: 2px; background: var(--border-hairline); overflow: hidden; border-radius: var(--radius-full); }
  .vm-splash-bar i {
    display: block; width: 40%; height: 100%; background: var(--accent); border-radius: var(--radius-full);
    animation: vmSplashSlide 1.1s var(--ease-standard) infinite;
  }
  @keyframes vmSplashSlide {
    from { transform: translateX(-110%); }
    to   { transform: translateX(360%); }
  }
  @media (prefers-reduced-motion: reduce) { .vm-splash-bar i { animation: none; width: 100%; opacity: 0.5; } }

  /* ── Panel chrome — column resizers + collapsed rails */
  .vm-resizer {
    width: 7px; margin: 0 -3px; flex-shrink: 0; align-self: stretch;
    cursor: col-resize; position: relative; z-index: 5; background: transparent;
    touch-action: none;
  }
  .vm-resizer::after {
    content: ""; position: absolute; top: 0; bottom: 0; left: 3px; width: 1px;
    background: transparent; transition: background var(--dur-fast) var(--ease-standard);
  }
  .vm-resizer:hover::after, .vm-resizer.dragging::after { background: var(--accent-glow); }
  body.vm-col-dragging { cursor: col-resize; user-select: none; }
  body.vm-col-dragging * { user-select: none !important; }
  #app {
    position: fixed; inset: 0;
    margin: auto;
    width: 100%; height: 100%;
    max-width: 1600px;
    display: flex;
    z-index: 1;
  }
  /* Glass app shell sits directly on the navy canvas */
  .vm-shell {
    flex: 1; margin: 0; height: 100%;
    border: 1px solid var(--border-hairline);
    overflow: hidden;
    background: var(--glass-0);
    -webkit-backdrop-filter: var(--glass-blur-0);
    backdrop-filter: var(--glass-blur-0);
  }
  @keyframes vmSpin { to { transform: rotate(360deg); } }
  @keyframes vmDrawerIn {
    from { transform: translateY(28px); opacity: 0.35; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  /* ── Thread reader header — reflows from inline (title+meta left, actions right)
     to stacked (title → actions → meta) once the pane gets narrow. Container
     query keyed off the pane width, so it works at any column/viewport size. */
  .vm-thread-reader { container-type: inline-size; container-name: vmthread; }
  .vm-thread-head {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto auto;
    grid-template-areas: "title actions collapse" "meta meta meta";
    column-gap: 8px; row-gap: 5px;
    align-items: center;
    padding: 16px 22px;
    border-bottom: 1px solid var(--border-hairline);
  }
  .vm-thread-title {
    grid-area: title; width: 100%; margin: 0;
    font-size: clamp(15px, var(--text-title), 18px);
    font-weight: var(--fw-bold); color: var(--text-primary); line-height: 1.3;
    overflow-wrap: anywhere;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .vm-thread-actions { grid-area: actions; display: flex; align-items: center; gap: 4px; align-self: center; }
  .vm-thread-collapse { grid-area: collapse; display: flex; align-items: center; align-self: center; }
  .vm-thread-meta { grid-area: meta; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  @container vmthread (max-width: 520px) {
    .vm-thread-head {
      grid-template-columns: minmax(0, 1fr) auto;
      grid-template-areas: "title collapse" "actions actions" "meta meta";
      row-gap: 12px; align-items: center;
    }
    .vm-thread-title { display: block; -webkit-line-clamp: unset; overflow: visible; }
    /* Pin the collapse toggle to the top of the (now multi-line) title row so it
       lines up with the inbox-list header toggle instead of dropping to the
       vertical centre of the wrapped title. */
    .vm-thread-collapse { align-self: start; }
  }

  /* ── Small / short viewport adjustments ──────────────────────────────────
     Only at this smaller screen size: tighten the collapsed-rail spacing so the
     Settings gear stays in view, and let the whole thread reader scroll as one
     container (cards expand to full height, reply flows at the bottom — nothing
     pinned). The desktop behaviour (fixed header + inner-scrolling message list,
     capped cards) is kept on taller screens. */
  @media (max-height: 820px) {
    /* Collapsed rail — tighten only the nav/label icons. The header block
       (hamburger + compose) keeps its original top padding and internal gap so
       the hamburger stays aligned with the Inbox label and the compose button
       with the search input. */
    .vm-sidebar.vm-rail .vm-nav-btn { height: 32px !important; }

    /* Thread reader — single scroll container */
    .vm-thread-reader { overflow-y: auto; }
    .vm-thread-msgs { flex: 0 0 auto !important; overflow: visible !important; }
    .vm-msg-body { max-height: none !important; overflow: visible !important; }
  }

  /* Recipient chips: drop the initials/user avatar, keep just the address + remove */
  .vm-chip-no-avatar > span:first-child { display: none !important; }
  .vm-chip-no-avatar { padding-left: 8px !important; }

  /* ── Thread message card — sender/date share a row when wide, stack when narrow */
  .vm-msg-date-stack { display: none; }
  @container vmthread (max-width: 440px) {
    .vm-msg-date-inline { display: none; }
    .vm-msg-date-stack { display: block; }
  }

  /* ── Empty-state hint line — one row with separator when wide, stacked without when narrow */
  .vm-empty-hints {
    display: flex; align-items: center; justify-content: center; white-space: nowrap;
  }
  @container vmempty (max-width: 380px) {
    .vm-empty-hints { flex-direction: column; gap: 2px; white-space: normal; }
    .vm-hint-sep { display: none; }
  }
</style>

<body>
<div id="vm-aurora" aria-hidden="true"><span class="vm-blob-a"></span><span class="vm-blob-b"></span></div>
<div id="vm-light-overlay" aria-hidden="true"></div>
<div id="app"><div class="vm-shell" id="root"></div></div>
<div id="vm-splash" aria-hidden="true">
  <div class="vm-splash-mark">
    <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"></rect><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path></svg>
  </div>
  <div class="vm-splash-word">Vibe<b>Mail</b></div>
  <div style="position: relative; display: flex; align-items: center; justify-content: center; width: fit-content; min-width: 140px; height: 40px;">
    <div class="vm-splash-bar" style="position: absolute; left: 50%; transform: translateX(-50%);"><i></i></div>
    <button id="vm-splash-google" type="button" onclick="window.__vmSplashSignIn && window.__vmSplashSignIn()">
    <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </button>
</div>
</div>
